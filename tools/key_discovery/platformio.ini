; T32 Key Discovery Firmware
;
; Standalone PlatformIO project — does NOT extend the root platformio.ini's
; [env_common]. This project intentionally pulls in only FastLED so the
; resulting binary stays small and free of USB-stack, Bluetooth, MIDI, and
; JSON dependencies. The single purpose is to discover the empirical mapping
; between matrix key index (0..31, top-left → bottom-right) and electrical
; mux channel (mux*16 + ch) on a T32 board.
;
; Build:    cd tools/key_discovery && pio run -t upload
; Monitor:  pio device monitor   (115200 baud)
; See README.md for the full operator workflow.

[env:t32_key_discovery]
; Platform pinned to match what the main firmware builds against. Without this,
; pio resolves "espressif32" to a newer version whose ESP-IDF breaks FastLED's
; ESP32 audio I2S code (designator-order error in idf5_i2s_context.hpp).
platform = espressif32 @ 6.11.0
framework = arduino
board = unwn_s3
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
lib_archive = no
lib_deps =
    fastled/FastLED @ ^3.6.0
build_flags =
    -I ../../src
build_src_filter = +<*>
