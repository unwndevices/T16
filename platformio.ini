; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
default_envs = t16_release

[env_common]
platform = espressif32
framework = arduino
board_build.filesystem = littlefs
lib_archive = no
# v1.0 latent-bug hotfix (Phase 10.1) — Path E:
#   - TinyUSB 3.3.0 kept; tinyusb-core sources (class/, common/, device/, host/,
#     osal/, portable/, tusb.c) excluded from the lib build via
#     scripts/exclude_tinyusb_max3421.py because Arduino-ESP32 already ships
#     the entire TinyUSB core in its prebuilt libarduino_tinyusb.a (compiling
#     them again produces wholesale duplicate-symbol link errors). Only the
#     Adafruit Arduino-glue layer under arduino/ is compiled.
#   - BLE-MIDI pinned to upstream tag v2.1.0. Both v2.1.0 and registry v2.2
#     contain the same `BLEMIDI_ESP32_NimBLE::begin` ODR violation (defined in
#     a header without `inline`). The fix on upstream master templates the
#     class — that is an API change requiring src/ updates, which D10.1.1
#     forbids. Instead, the pre-build script injects an `inline` keyword into
#     the installed libdep header at build time. Build-tree adjustment only;
#     no fork, no source patch under src/, no lib_ignore.
# See .planning/phases/10.1-lib-deps-conflict-hotfix/10.1-CONTEXT.md
#     (D10.1.1, D10.1.2) and 10.1-01-BLOCKER.md for why Paths A/B/C failed.
extra_scripts =
	pre:scripts/exclude_tinyusb_max3421.py
lib_deps =
	adafruit/Adafruit TinyUSB Library @ 3.3.0
	h2zero/NimBLE-Arduino@^1.4.0
	https://github.com/lathoub/Arduino-BLE-MIDI.git#v2.1.0
	https://github.com/FortySevenEffects/arduino_midi_library.git#feat/v5.1.0
	fastled/FastLED @ ^3.6.0
	bblanchon/StreamUtils@^1.8.0
	bblanchon/ArduinoJson@^7.0.3
build_flags =
	-DUSE_TINYUSB

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

[env:t16_debug]
extends = env_common
board = unwn_s3
build_flags =
	${env_common.build_flags}
	-Os
	-DCORE_DEBUG_LEVEL=5
	-DREV_B
	-DT16

[env:t16_release]
extends = env_common
board = unwn_s3
build_flags =
	${env_common.build_flags}
	-Os
	-DCORE_DEBUG_LEVEL=0
	-DREV_B
	-DT16

[env:t32_debug]
extends = env_common
board = unwn_s3
build_flags =
	${env_common.build_flags}
	-Os
	-DCORE_DEBUG_LEVEL=5
	-DREV_B
	-DT32

[env:t32_release]
extends = env_common
board = unwn_s3
build_flags =
	${env_common.build_flags}
	-Os
	-DCORE_DEBUG_LEVEL=0
	-DREV_B
	-DT32

[env:native_test]
platform = native
build_flags =
	-std=c++17
	-I test/native_stubs
	-I src
	-DNATIVE_TEST
	-DT16
	-DREV_B
build_src_filter =
	-<*>
test_framework = unity
lib_deps =
	bblanchon/ArduinoJson@^7.0.3
lib_ignore =
	Adafruit TinyUSB Library
	NimBLE-Arduino
	BLE-MIDI
	FastLED
	StreamUtils