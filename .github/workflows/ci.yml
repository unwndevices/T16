name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  firmware-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [t16_debug, t16_release, t32_debug, t32_release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}-${{ matrix.env }}
          restore-keys: |
            pio-${{ hashFiles('platformio.ini') }}-
            pio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware (${{ matrix.env }})
        run: pio run -e ${{ matrix.env }}

  firmware-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}-native_test
          restore-keys: pio-${{ hashFiles('platformio.ini') }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run firmware unit tests
        run: pio test -e native_test

  # NOTE: A `firmware-format` job using `clang-format --dry-run --Werror` was
  # removed in the Phase 13 review-fix pass (WR-07). The repo has no
  # `.clang-format` config, so the job applied LLVM defaults that conflict with
  # the codebase's actual style (Allman braces, 4-space indent, mixed naming
  # per CLAUDE.md), causing CI to fail every file on first run. Re-enable only
  # after a `.clang-format` matching the project conventions is committed.

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editor-tx
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: editor-tx/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npx prettier --check .

      - name: Run tests
        run: npm run test -- --run

      - name: Build
        run: npm run build
